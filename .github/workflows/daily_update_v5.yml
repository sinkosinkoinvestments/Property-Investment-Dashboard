name: Cloud Property Scraper Pipeline (V5 Post-Budget 2026)

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  scrape-and-analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Packages
        run: pip install -r requirements.txt

      - name: Run Property Scraper & Market Analyzer (V5)
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          DOMAIN_CLIENT_ID: ${{ secrets.DOMAIN_CLIENT_ID }}
          DOMAIN_CLIENT_SECRET: ${{ secrets.DOMAIN_CLIENT_SECRET }}
          DOMAIN_SCOPE: api_listings_read
          DOMAIN_AUTH_URL: https://auth.domain.com.au/v1/connect/token
          DOMAIN_LISTINGS_URL: https://api.domain.com.au/sandbox/v1/listings/residential/_search
          CURRENT_INTEREST_RATE: ${{ vars.CURRENT_INTEREST_RATE || '0.065' }}
          ASSUME_NEW_BUILD_DEFAULT: ${{ vars.ASSUME_NEW_BUILD_DEFAULT || 'No' }}
        run: |
          echo "Token length is: ${#APIFY_API_TOKEN}"
          python src/property_updater_cloud_v5.py

      - name: Upload Domain log
        uses: actions/upload-artifact@v4
        with:
          name: domain-debug-log
          path: .github/logs/domain_debug.log

      - name: Run Off-Market Email Parser (V3)
        env:
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
          IMAP_HOST: "imap.gmail.com"
          IMAP_PORT: "993"
        run: python src/email_parser_cloud_v2.py

      - name: Commit and Push Updated CSVs
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Automated Data Update: V5 Pipeline"
          file_pattern: "data/*.csv"
